name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill structure
        run: |
          error=0
          for d in skills/*; do
            [ -d "$d" ] || continue
            if [ ! -f "$d/SKILL.md" ]; then
              echo "::error file=$d::Missing SKILL.md"
              error=1
              continue
            fi
            if ! head -1 "$d/SKILL.md" | grep -q '^---'; then
              echo "::error file=$d/SKILL.md::Missing YAML frontmatter"
              error=1
            fi
          done
          exit $error

      - name: Check Codex-only wording
        run: |
          pattern='Clau''de|clau''de|Ma''rs|ma''rs|Meri''dian|meri''dian|\.clau''de|\.meri''dian|Clau''de Code|Clau''de\.ai'
          if grep -RInE --exclude-dir=.git "$pattern" .; then
            echo "::error::Found non-Codex runtime references"
            exit 1
          fi
